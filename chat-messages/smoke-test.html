<div class="chat-conversation chat-conversation--hover">

  <div class="chat-preview">
    <span class="chat-preview__text"><span class="chat-preview__msg">Work skin 测试</span></span>
    <span class="chat-preview__chevron"></span>
  </div>

  <div class="chat-conversation__stack">

    <div class="chat-meta">
      <span class="chat-timestamp">Today 10:00 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--received">测试文字 — 如果你看到灰色气泡，说明 work skin 已挂载。</span>
      </div>
    </div>

    <div class="chat-meta">
      <span class="chat-timestamp">Today 10:01 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--sent">绿色气泡说明发送/接收样式均正常。</span>
      </div>
    </div>

    <span class="chat-conversation__hint">Hover to reveal</span>

  </div>

</div>
