<details class="chat-conversation chat-conversation--details">
  <summary class="chat-conversation__tapper">

    <!-- Collapsed preview bar -->
    <div class="chat-preview">
      <span class="chat-preview__text"><span class="chat-preview__msg">【发送者名字】</span></span>
      <span class="chat-preview__chevron"></span>
    </div>

    <!-- Full conversation (visible when <details> open) -->
    <div class="chat-conversation__stack">

      <!-- Message group: received -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:41 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--received">【第一条消息内容】</span>
        </div>
      </div>

      <!-- Message group: sent -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:42 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--sent">【发送者回复内容】</span>
          <span class="chat-bubble chat-bubble--sent">【第二条发送消息】</span>
        </div>
      </div>

      <!-- Message group: received -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:43 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--received">【第三条消息内容】</span>
        </div>
      </div>

      <!-- Message group: sent -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:44 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--sent">【第四条消息内容】</span>
          <span class="chat-bubble chat-bubble--sent">【第五条消息内容】</span>
        </div>
      </div>
      <span class="chat-conversation__hint">Tap to collapse</span>
    </div>

  </summary>
</details>
