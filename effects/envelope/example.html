<!-- Hover example -->
<div class="trifold-letter">
  <span class="letter-cover">
    <span class="letter-cover-text">
      <span class="letter-from">[Sender or subtitle]&#10;[Address line 1]&#10;[Address line 2]</span>
      <span class="letter-stamp">AO3</span>
      <span class="letter-to">[Recipient or letter title]</span>
    </span>
  </span>
  <span class="letter-top">
    <span class="letter-top-text">
      <span class="letter-body">[First panel text]</span>
    </span>
  </span>
  <span class="letter-mid">
    <span class="letter-mid-text">
      <span class="letter-body">[Second panel text]</span>
    </span>
  </span>
  <span class="letter-bot">
    <span class="letter-bot-text">
      <span class="letter-body">[Third panel text]</span>
    </span>
  </span>
</div>
