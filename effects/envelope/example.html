<!-- Hover example -->
<div class="envelope envelope--hover">
  <span class="cover">
    <span class="cover-copy">
      <span class="from">[Sender or subtitle]&#10;[Address line 1]&#10;[Address line 2]</span>
      <span class="stamp">AO3</span>
      <span class="to">[Recipient or letter title]</span>
    </span>
  </span>
  <span class="panel panel--top">
    <span class="panel-copy">
      <span class="body">[First panel text]</span>
    </span>
  </span>
  <span class="panel panel--mid">
    <span class="panel-copy">
      <span class="body">[Second panel text]</span>
    </span>
  </span>
  <span class="panel panel--bottom">
    <span class="panel-copy">
      <span class="body">[Third panel text]</span>
    </span>
  </span>
</div>
