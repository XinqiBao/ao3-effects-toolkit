<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 Typewriter — Preview</title>
  <link rel="stylesheet" href="../_shared/preview-shell.css">
  <link rel="stylesheet" href="work-skin.css">
  <style>
    #workskin {
      width: 720px;
      height: 360px;
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <p class="hero__label">AO3 Effect Preview</p>
    <h1 class="hero__title">Typewriter</h1>
    <p class="hero__desc">A dark transcript panel that reveals lines in sequence.</p>
  </section>
  <div id="workskin">
    <div class="typewriter-stage">
      <div class="typewriter-container typewriter--hover">
        <span class="typewriter-prompt">Begin typing to read...</span>
        <div class="typewriter-text">
          <span class="typewriter-line">The rain had not stopped since Tuesday.</span>
          <span class="typewriter-line">She sat by the window with a cold cup of tea.</span>
          <span class="typewriter-line">The answer, as always, was longer than she hoped.</span>
        </div>
        <span class="typewriter-cursor-wrapper">
          <span class="typewriter-cursor"></span>
        </span>
      </div>
    </div>
  </div>
</main>
</body>
</html>
