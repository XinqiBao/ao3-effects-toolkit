<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 Typewriter — Preview</title>
  <link rel="stylesheet" href="../_shared/preview-shell.css">
  <link rel="stylesheet" href="work-skin.css">
  <style>
    #workskin .preview-card__stage-shell {
      background:
        radial-gradient(circle at top, rgba(94, 91, 88, 0.2), transparent 34%),
        linear-gradient(180deg, #302c29 0%, #262220 52%, #1b1816 100%);
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 28px 44px rgba(24, 20, 18, 0.16);
    }

    #workskin .preview-card__stage {
      min-height: 360px;
      padding-top: 18px;
    }

    #workskin .typewriter-hint {
      color: #c0b2a1;
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <p class="hero__label">AO3 Effect Preview</p>
    <h1 class="hero__title">Typewriter</h1>
    <p class="hero__desc">A dark transcript panel that reveals lines in sequence.</p>
  </section>
  <div id="workskin">
    <section class="preview-card">
      <div class="preview-card__stage-shell">
        <div class="preview-card__stage">
          <div class="typewriter-stage">
            <div class="typewriter-container typewriter--hover">
              <span class="typewriter-prompt">Begin typing to read...</span>
              <div class="typewriter-text">
                <span class="typewriter-line">The rain had not stopped since Tuesday.</span>
                <span class="typewriter-line">She sat by the window with a cold cup of tea.</span>
                <span class="typewriter-line">The answer, as always, was longer than she hoped.</span>
              </div>
              <span class="typewriter-cursor-wrapper">
                <span class="typewriter-cursor"></span>
              </span>
              <span class="typewriter-hint">Hover to read</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
</body>
</html>
