<!-- ============================================================
     AO3 Chat Messages — Hover Template (desktop-friendly)
     Paste into AO3 HTML editor.
     Requires: effects/chat-messages/work-skin.css (or equivalent)
     Interaction: expands on :hover
     ============================================================ -->

<div class="chat-conversation chat-conversation--hover">

  <!-- Collapsed preview bar -->
  <div class="chat-preview">
    <span class="chat-preview__text"><span class="chat-preview__msg">Tap to read message thread</span></span>
    <span class="chat-preview__chevron"></span>
  </div>

  <!-- Full conversation stack — expands on hover -->
  <div class="chat-conversation__stack">

    <!-- Message group: received -->
    <div class="chat-meta">
      <span class="chat-timestamp">Today 9:41 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--received">&hearts;</span>
        <span class="chat-bubble chat-bubble--received">[First message]</span>
      </div>
    </div>

    <!-- Message group: sent -->
    <div class="chat-meta">
      <span class="chat-timestamp">Today 9:41 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--sent">[Second message]</span>
      </div>
    </div>

    <!-- Message group: received -->
    <div class="chat-meta">
      <span class="chat-timestamp">Today 9:42 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--received">[Third message]</span>
        <span class="chat-bubble chat-bubble--received">[Fourth message]</span>
      </div>
    </div>

    <!-- Message group: sent -->
    <div class="chat-meta">
      <span class="chat-timestamp">Today 9:43 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--sent">[Fifth message]</span>
      </div>
    </div>

    <span class="chat-conversation__hint">Hover to scroll up</span>
  </div>
</div>
