<!-- Hover-only canonical example -->
<div class="chat-conversation chat-conversation--hover">
  <div class="chat-preview">
    <span class="chat-preview__text"><span class="chat-preview__msg">Avery Monroe</span></span>
    <span class="chat-preview__chevron"></span>
  </div>
  <div class="chat-conversation__stack">
    <div class="chat-meta">
      <span class="chat-timestamp">Apr 12, 2026 · 9:41 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--received">Thinking about publishing tonight—can you double-check the hover copy?</span>
      </div>
    </div>
    <div class="chat-meta chat-meta--sent">
      <span class="chat-timestamp">Apr 12, 2026 · 9:42 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--sent">Just looked at it; the preview and color still match the designer notes.</span>
      </div>
    </div>
  </div>
</div>
