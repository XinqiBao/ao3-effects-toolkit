<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 Chat Messages — Preview</title>
  <link rel="stylesheet" href="../_shared/preview-shell.css">
  <link rel="stylesheet" href="work-skin.css">
  <style>
    #workskin .preview-card__stage-shell {
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 42%),
        linear-gradient(180deg, #f4f2f6 0%, #ebe8ef 100%);
    }

    #workskin .preview-card__stage {
      min-height: 420px;
    }

    #workskin .chat-conversation {
      border-color: rgba(75, 57, 44, 0.14);
      background: linear-gradient(180deg, #f6f5f8 0%, #f0eff4 100%);
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <p class="hero__label">AO3 Effect Preview</p>
    <h1 class="hero__title">Chat Messages</h1>
  </section>
  <div id="workskin">
    <div class="grid" style="--cols: 1;">
      <section class="preview-card">
        <div class="preview-card__stage-shell">
          <div class="preview-card__stage">
            <div class="chat-conversation chat-conversation--hover">
              <div class="chat-preview">
                <span class="chat-preview__text"><span class="chat-preview__msg">Mia</span> • 7 messages</span>
                <span class="chat-preview__chevron"></span>
              </div>
              <div class="chat-conversation__stack">
                <div class="chat-meta">
                  <span class="chat-timestamp">11:08 PM</span>
                  <div class="chat-bubbles">
                    <span class="chat-bubble chat-bubble--received">You make it home?</span>
                  </div>
                </div>
                <div class="chat-meta chat-meta--sent">
                  <span class="chat-timestamp">11:11 PM</span>
                  <div class="chat-bubbles">
                    <span class="chat-bubble chat-bubble--sent">Just got in.</span>
                    <span class="chat-bubble chat-bubble--sent">You were about to say something.</span>
                  </div>
                </div>
                <div class="chat-meta">
                  <span class="chat-timestamp">11:13 PM</span>
                  <div class="chat-bubbles">
                    <span class="chat-bubble chat-bubble--received">Maybe.</span>
                    <span class="chat-bubble chat-bubble--received">But not here.</span>
                  </div>
                </div>
                <div class="chat-meta chat-meta--sent">
                  <span class="chat-timestamp">11:14 PM</span>
                  <div class="chat-bubbles">
                    <span class="chat-bubble chat-bubble--sent">Then where?</span>
                  </div>
                </div>
                <div class="chat-meta">
                  <span class="chat-timestamp">11:15 PM</span>
                  <div class="chat-bubbles">
                    <span class="chat-bubble chat-bubble--received">Same place as last time.</span>
                    <span class="chat-bubble chat-bubble--received">Bring the red notebook.</span>
                  </div>
                </div>
                <div class="chat-meta chat-meta--sent">
                  <span class="chat-timestamp">11:17 PM</span>
                  <div class="chat-bubbles">
                    <span class="chat-bubble chat-bubble--sent">On my way.</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <p class="preview-card__hint">Hover the bar to expand the thread.</p>
      </section>
    </div>
  </div>
</main>
</body>
</html>
