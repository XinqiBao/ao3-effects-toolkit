<details class="chat-conversation chat-conversation--details">
  <summary class="chat-conversation__tapper">

    <!-- Collapsed preview bar -->
    <div class="chat-preview">
      <span class="chat-preview__text"><span class="chat-preview__msg">[Sender name]</span></span>
      <span class="chat-preview__chevron"></span>
    </div>

    <!-- Full conversation (visible when <details> open) -->
    <div class="chat-conversation__stack">

      <!-- Message group: received -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:41 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--received">[First message]</span>
        </div>
      </div>

      <!-- Message group: sent -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:42 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--sent">[Reply from sender]</span>
          <span class="chat-bubble chat-bubble--sent">[Second sent message]</span>
        </div>
      </div>

      <!-- Message group: received -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:43 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--received">[Third message]</span>
        </div>
      </div>

      <!-- Message group: sent -->
      <div class="chat-meta">
        <span class="chat-timestamp">Today 9:44 AM</span>
        <div class="chat-bubbles">
          <span class="chat-bubble chat-bubble--sent">[Fourth message]</span>
          <span class="chat-bubble chat-bubble--sent">[Fifth message]</span>
        </div>
      </div>
      <span class="chat-conversation__hint">Tap to collapse</span>
    </div>

  </summary>
</details>
