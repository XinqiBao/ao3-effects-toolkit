<div class="chat-conversation chat-conversation--hover">

  <div class="chat-preview">
    <span class="chat-preview__text"><span class="chat-preview__msg">Work skin test</span></span>
    <span class="chat-preview__chevron"></span>
  </div>

  <div class="chat-conversation__stack">

    <div class="chat-meta">
      <span class="chat-timestamp">Today 10:00 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--received">Test message: if you can see the gray bubble, the work skin is attached.</span>
      </div>
    </div>

    <div class="chat-meta">
      <span class="chat-timestamp">Today 10:01 AM</span>
      <div class="chat-bubbles">
        <span class="chat-bubble chat-bubble--sent">The green bubble confirms the sent and received styles are both working.</span>
      </div>
    </div>

    <span class="chat-conversation__hint">Hover to reveal</span>

  </div>

</div>
