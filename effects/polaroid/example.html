<!-- Hover example -->
<div class="polaroid-gallery">
  <div class="polaroid-container">
    <div class="polaroid-inner polaroid--hover">
      <span class="polaroid-front">
        <span class="polaroid-frame"></span>
        <span class="polaroid-image"></span>
        <span class="polaroid-caption">summer of '92</span>
      </span>
      <span class="polaroid-back">
        <span class="polaroid-back-inner">
          <span class="polaroid-message">Remember the lake house?&#10;We stayed up until dawn.&#10;The fog never lifted.</span>
        </span>
      </span>
    </div>
    <span class="polaroid-hint">Hover to flip</span>
  </div>
</div>

<!-- Tap example -->
<div class="polaroid-gallery">
  <div class="polaroid-container">
    <details class="polaroid-inner polaroid--details">
      <summary>
        <span class="polaroid-front">
          <span class="polaroid-frame"></span>
          <span class="polaroid-image"></span>
          <span class="polaroid-caption">summer of '92</span>
        </span>
        <span class="polaroid-back">
          <span class="polaroid-back-inner">
            <span class="polaroid-message">Remember the lake house?&#10;We stayed up until dawn.&#10;The fog never lifted.</span>
          </span>
        </span>
      </summary>
    </details>
    <span class="polaroid-hint">Tap to flip</span>
  </div>
</div>
