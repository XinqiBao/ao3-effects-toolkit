<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 Polaroid — Preview</title>
  <link rel="stylesheet" href="../_shared/preview-shell.css">
  <link rel="stylesheet" href="work-skin.css">
  <style>
    #workskin {
      width: 260px;
    }

    /* Preview-only presentation helper: use a real photo without changing the published markup. */
    #workskin .polaroid .photo {
      background:
        url("../../assets/preview-media/polaroid-photo-a.jpg") center 20% / cover no-repeat,
        linear-gradient(135deg, #fdf6ee 0%, #d8cdbf 35%, #b09d7f 65%, #7c634d 100%);
    }

    @media (forced-colors: active) {
      #workskin .polaroid .photo {
        background: Canvas;
        border: 1px solid CanvasText;
        box-shadow: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <p class="hero__label">AO3 Effect Preview</p>
    <h1 class="hero__title">Polaroid</h1>
    <p class="hero__desc">A single print that flips to reveal the note on the back.</p>
  </section>
  <div id="workskin">
    <div class="polaroid polaroid--hover">
      <span class="front">
        <span class="frame"></span>
        <span class="photo"></span>
        <span class="caption">studio portrait</span>
      </span>
      <span class="back">
        <span class="message">Filed without a sitter name. The reverse keeps only the date and archive number.</span>
      </span>
    </div>
  </div>
</main>
</body>
</html>
