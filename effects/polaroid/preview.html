<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 Polaroid — Preview</title>
  <link rel="stylesheet" href="../_shared/preview-shell.css">
  <link rel="stylesheet" href="work-skin.css">
  <style>
    #workskin.polaroid-preview .preview-card {
      max-width: 760px;
      margin: 0 auto;
    }

    #workskin.polaroid-preview .preview-card__stage-shell {
      background:
        linear-gradient(180deg, rgba(255, 251, 246, 0.9), rgba(235, 223, 210, 0.96)),
        linear-gradient(135deg, rgba(167, 138, 110, 0.08), rgba(255, 255, 255, 0));
    }

    #workskin.polaroid-preview .preview-card__stage {
      min-height: 420px;
    }

    #workskin.polaroid-preview .polaroid-gallery {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* Preview-only presentation helper: use a real photo without changing the published markup. */
    #workskin.polaroid-preview .polaroid-image {
      background:
        url("../../assets/preview-media/polaroid-photo-a.jpg") center 20% / cover no-repeat,
        linear-gradient(135deg, #fdf6ee 0%, #d8cdbf 35%, #b09d7f 65%, #7c634d 100%);
    }

    @media (forced-colors: active) {
      #workskin.polaroid-preview .polaroid-image {
        background: Canvas;
        border: 1px solid CanvasText;
        box-shadow: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <p class="hero__label">AO3 Effect Preview</p>
    <h1 class="hero__title">Polaroid</h1>
    <p class="hero__desc">A single print that flips to reveal the note on the back.</p>
  </section>
  <div id="workskin" class="polaroid-preview">
    <section class="preview-card preview-card--hover">
      <p class="preview-card__label">Hover</p>
      <p class="preview-card__note">Hover the print to reveal the back.</p>
      <div class="preview-card__stage-shell">
        <div class="preview-card__stage">
          <div class="polaroid-gallery">
            <div class="polaroid-container">
              <div class="polaroid-inner polaroid--hover">
                <span class="polaroid-front">
                  <span class="polaroid-frame"></span>
                  <span class="polaroid-image"></span>
                  <span class="polaroid-caption">studio portrait</span>
                </span>
                <span class="polaroid-back">
                  <span class="polaroid-back-inner">
                    <span class="polaroid-message">Filed without a sitter name. The reverse keeps only the date and archive number.</span>
                  </span>
                </span>
              </div>
              <span class="polaroid-hint">Hover to flip</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
</body>
</html>
