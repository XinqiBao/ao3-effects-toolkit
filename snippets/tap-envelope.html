<div id="letter-reset"></div>
<div id="letter-open" class="ao3-envelope ao3-envelope--target">
  <a class="ao3-envelope-toggle ao3-envelope-toggle--open" href="#letter-open"
    >Open envelope</a
  >
  <a class="ao3-envelope-toggle ao3-envelope-toggle--close" href="#letter-reset"
    >Close letter</a
  >
  <div class="ao3-envelope-shell">
    <span class="ao3-envelope-shadow"></span>
    <span class="ao3-envelope-back"></span>
    <span class="ao3-envelope-peek"></span>
    <span class="ao3-envelope-flap-wrap">
      <span class="ao3-envelope-flap"></span>
    </span>
    <span class="ao3-envelope-front"></span>
    <span class="ao3-envelope-fold ao3-envelope-fold--left"></span>
    <span class="ao3-envelope-fold ao3-envelope-fold--right"></span>
    <span class="ao3-envelope-stamp">OPEN</span>
    <span class="ao3-envelope-address ao3-envelope-address--from"
      >Your Archive Copy<br />Mobile Friendly</span
    >
    <span class="ao3-envelope-address ao3-envelope-address--to"
      >Tap once to open, use the close link to reset</span
    >
    <span class="ao3-envelope-hint">Tap to unfold</span>
  </div>

  <div class="ao3-letter-stack">
    <div class="ao3-letter-panel ao3-letter-panel--one">
      <div class="ao3-letter-scroll">
        <p class="ao3-letter-kicker">First Fold</p>
        <p>Put the first block of letter text here.</p>
      </div>
    </div>

    <div class="ao3-letter-panel ao3-letter-panel--two">
      <div class="ao3-letter-scroll">
        <p class="ao3-letter-kicker">Second Fold</p>
        <p>Put the second block of letter text here.</p>
      </div>
    </div>

    <div class="ao3-letter-panel ao3-letter-panel--three">
      <div class="ao3-letter-scroll">
        <p class="ao3-letter-kicker">Third Fold</p>
        <p>Put the final block of letter text here.</p>
      </div>
    </div>
  </div>
</div>
